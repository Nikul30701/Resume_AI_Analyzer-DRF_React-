# Serves static files and enables SPA routing with fallback to index.html

# user nginx; # Commented for non-root compatibility
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss;

    # ========================================================================
    # React/Vite SPA Server
    # ========================================================================
    server {
        listen 3000;
        server_name _;

        # Root directory for static files
        root /usr/share/nginx/html;
        index index.html;

        # ====================================================================
        # Security Headers
        # ====================================================================
        
        # Content Security Policy
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:;" always;
        
        # Prevent clickjacking
        add_header X-Frame-Options "SAMEORIGIN" always;
        
        # Prevent MIME type sniffing
        add_header X-Content-Type-Options "nosniff" always;
        
        # Enable XSS protection
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Referrer Policy
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Feature Policy
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ====================================================================
        # Static file caching
        # ====================================================================
        
        # Cache busted files (have hash in name) - cache for 1 year
        location ~* "\.[a-f0-9]{8}\.(js|css|png|jpg|jpeg|gif|svg|woff|woff2)$" {
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        # Regular static files - cache for 1 month
        location ~* "\.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$" {
            expires 30d;
            add_header Cache-Control "public";
        }

        # Don't cache HTML files
        location ~* "\.html?$" {
            expires -1;
            add_header Cache-Control "public, must-revalidate, proxy-revalidate";
        }

        # ====================================================================
        # Proxy to Backend API
        # ====================================================================
        location /api/ {
            proxy_pass http://backend:8000/api/;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /static/ {
            proxy_pass http://backend:8000/static/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /media/ {
            proxy_pass http://backend:8000/media/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ====================================================================
        # SPA Fallback - All non-file requests go to index.html
        # ====================================================================
        location / {
            # Try to serve static file first
            # If file doesn't exist, fallback to index.html for SPA routing
            try_files $uri $uri/ /index.html;

            # Set cache headers for index.html
            add_header Cache-Control "public, must-revalidate";
        }

        # ====================================================================
        # Error pages
        # ====================================================================
        error_page 404 /index.html;
        error_page 500 502 503 504 /index.html;
    }
}
